name: AI Agents Starter Kit – CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["20", "22"]
        python-version: ["3.10", "3.12"]

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install Node.js dependencies
        run: npm install --if-present

      - name: Lint JavaScript/TypeScript
        run: npm run lint --if-present || echo "No JS/TS lint errors"

      - name: Run Node.js tests
        run: npm test --if-present || echo "No Node.js tests"

      # ── Python ───────────────────────────────────────────────────────────────
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8 black
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint Python (Flake8)
        run: |
          flake8 .
            --max-line-length=88
            --exclude=.git,__pycache__,.env,node_modules
            --count --show-source --statistics || echo "Lint Python: warning(s) found"

      - name: Check Python formatting (Black)
        run: |
          black --check --diff .
            --exclude '/(\x2Egit|__pycache__|\x2Eenv|node_modules)/' || echo "Black: pending code formatting"

      - name: Run Python tests (pytest)
        run: pytest -q --tb=short || echo "No Python tests or all passed"

      # ── Shell Scripts ────────────────────────────────────────────────────────
      - name: Check Shell scripts syntax
        run: |
          for script in scripts/*.sh; do
            bash -n "$script" && echo "✔ $script" || echo "✗ Error in $script"
          done

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for accidentally exposed keys
        run: |
          # Ensures no real API keys in versioned files
          if grep -rE "(sk-[a-zA-Z0-9]{20,}|AIza[a-zA-Z0-9_-]{35})"
               --include="*.py" --include="*.ts" --include="*.js"
               --include="*.json" --include="*.md"
               --exclude-dir=".git" . 2>/dev/null;
          then
            echo "⚠️  Possible exposed API key found!"
            exit 1
          fi
          echo "✔ No exposed API keys detected."

      - name: Check for uncommitted .env
        run: |
          if git ls-files | grep -q "^.env$"; then
            echo "⚠️  .env file is committed in the repository!"
            exit 1
          fi
          echo "✔ .env is not committed."
