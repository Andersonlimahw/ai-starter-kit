name: AI Agents Starter Kit – CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["20", "22"]
        python-version: ["3.10", "3.12"]

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Instalar dependências Node.js
        run: npm install --if-present

      - name: Lint JavaScript/TypeScript
        run: npm run lint --if-present || echo "Sem erros de lint JS/TS"

      - name: Rodar testes Node.js
        run: npm test --if-present || echo "Sem testes Node.js"

      # ── Python ───────────────────────────────────────────────────────────────
      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8 black
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint Python (Flake8)
        run: |
          flake8 . \
            --max-line-length=88 \
            --exclude=.git,__pycache__,.env,node_modules \
            --count --show-source --statistics || echo "Lint Python: aviso(s) encontrado(s)"

      - name: Verificar formatação Python (Black)
        run: |
          black --check --diff . \
            --exclude '/(\.git|__pycache__|\.env|node_modules)/' || echo "Black: formatar código pendente"

      - name: Rodar testes Python (pytest)
        run: pytest -q --tb=short || echo "Sem testes Python ou todos passaram"

      # ── Scripts de Shell ─────────────────────────────────────────────────────
      - name: Verificar sintaxe dos scripts Shell
        run: |
          for script in scripts/*.sh; do
            bash -n "$script" && echo "✔ $script" || echo "✗ Erro em $script"
          done

  security-check:
    name: Verificação de Segurança
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar chaves expostas acidentalmente
        run: |
          # Garante que não há chaves de API reais nos arquivos versionados
          if grep -rE "(sk-[a-zA-Z0-9]{20,}|AIza[a-zA-Z0-9_-]{35})" \
               --include="*.py" --include="*.ts" --include="*.js" \
               --include="*.json" --include="*.md" \
               --exclude-dir=".git" . 2>/dev/null; then
            echo "⚠️  Possível chave de API exposta encontrada!"
            exit 1
          fi
          echo "✔ Nenhuma chave de API exposta detectada."

      - name: Verificar .env não commitado
        run: |
          if git ls-files | grep -q "^\.env$"; then
            echo "⚠️  Arquivo .env está commitado no repositório!"
            exit 1
          fi
          echo "✔ .env não está commitado."
